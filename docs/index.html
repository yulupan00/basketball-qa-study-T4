<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Video QA - Human Study</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div class="landing-header">
                <h1>Sports Video QA</h1>
                <p class="subtitle">Human Evaluation Study</p>
            </div>
            <div class="landing-body">
                <p class="description">
                    Welcome! Please select a sport to begin the evaluation study.
                    You will watch short video clips and answer multiple-choice questions.
                </p>
                <div class="sport-buttons">
                    <a href="start.html?sport=basketball" class="btn btn-sport btn-basketball">
                        Basketball
                    </a>
                    <span class="btn btn-sport btn-hockey" style="opacity:0.5;pointer-events:none;cursor:default;">
                        Hockey (Coming Soon)
                    </span>
                    <span class="btn btn-sport btn-soccer" style="opacity:0.5;pointer-events:none;cursor:default;">
                        Soccer (Coming Soon)
                    </span>
                </div>
            </div>
        </div>
    </div>

</html>
